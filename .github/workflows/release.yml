name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Docker image: bake vpnode source into the builder image ───────────
  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: vpnode
          push: true
          tags: |
            churlee/vpn-node-builder:latest
            churlee/vpn-node-builder:${{ github.ref_name }}

  # ── vpn-setup: cross-compile all platforms from one Linux runner ──────
  build-installer:
    needs: build-docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: vpnode/installer/go.mod

      - name: Build vpn-setup for all platforms
        working-directory: vpnode/installer
        run: |
          GOOS=windows GOARCH=amd64 go build -o vpn-setup.exe .
          GOOS=linux   GOARCH=amd64 go build -o vpn-setup-linux .
          GOOS=darwin  GOARCH=arm64 go build -o vpn-setup-mac .

      - uses: actions/upload-artifact@v4
        with:
          name: vpn-setup
          path: |
            vpnode/installer/vpn-setup.exe
            vpnode/installer/vpn-setup-linux
            vpnode/installer/vpn-setup-mac

  # ── vpn-client: native build per platform (Wails needs CGO + webview) ─
  build-client:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: vpn-client.exe
          - os: ubuntu-latest
            artifact: vpn-client.deb
          - os: macos-latest
            artifact: vpn-client.pkg

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: client/vpn-client/go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Linux system deps (webkit2gtk)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev pkg-config

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build (Windows)
        if: runner.os == 'Windows'
        working-directory: client/vpn-client
        run: wails build -clean

      - name: Build (Linux)
        if: runner.os == 'Linux'
        working-directory: client/vpn-client
        run: wails build -clean

      - name: Build (macOS)
        if: runner.os == 'macOS'
        working-directory: client/vpn-client
        run: wails build -clean -platform darwin/universal

      - name: Package .deb (Linux)
        if: runner.os == 'Linux'
        working-directory: client/vpn-client/packaging
        run: |
          chmod +x build.sh linux/DEBIAN/postinst
          ./build.sh

      - name: Package .pkg (macOS)
        if: runner.os == 'macOS'
        working-directory: client/vpn-client/packaging
        run: |
          chmod +x build.sh mac/scripts/postinstall
          ./build.sh

      - name: Collect artifact
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv client/vpn-client/build/bin/vpn-client.exe vpn-client.exe
          elif [ "${{ runner.os }}" = "Linux" ]; then
            mv client/vpn-client/packaging/vpn-client.deb vpn-client.deb
          else
            mv client/vpn-client/packaging/vpn-client.pkg vpn-client.pkg
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # ── Upload everything to the GitHub Release ───────────────────────────
  release:
    needs: [build-docker, build-installer, build-client]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            vpn-setup.exe
            vpn-setup-linux
            vpn-setup-mac
            vpn-client.exe
            vpn-client.deb
            vpn-client.pkg
