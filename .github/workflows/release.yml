name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── vpn-setup: cross-compile all platforms from one Linux runner ──────
  build-installer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: vpnode/installer/go.mod

      - name: Build vpn-setup for all platforms
        working-directory: vpnode/installer
        run: |
          GOOS=windows GOARCH=amd64 go build -o vpn-setup.exe .
          GOOS=linux   GOARCH=amd64 go build -o vpn-setup-linux .
          GOOS=darwin  GOARCH=arm64 go build -o vpn-setup-mac .

      - uses: actions/upload-artifact@v4
        with:
          name: vpn-setup
          path: |
            vpnode/installer/vpn-setup.exe
            vpnode/installer/vpn-setup-linux
            vpnode/installer/vpn-setup-mac

  # ── vpn-client: native build per platform (Wails needs CGO + webview) ─
  build-client:
    strategy:
      matrix:
        include:
          - os: windows-latest
            output: vpn-client.exe
          - os: ubuntu-latest
            output: vpn-client-linux
          - os: macos-latest
            output: vpn-client-mac

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: client/vpn-client/go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Linux system deps (webkit2gtk)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev pkg-config

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        working-directory: client/vpn-client
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            wails build -clean -platform darwin/universal
          else
            wails build -clean
          fi

      - name: Rename output
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv client/vpn-client/build/bin/vpn-client.exe ${{ matrix.output }}
          else
            mv client/vpn-client/build/bin/vpn-client ${{ matrix.output }}
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}

  # ── Upload everything to the GitHub Release ───────────────────────────
  release:
    needs: [build-installer, build-client]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            vpn-setup.exe
            vpn-setup-linux
            vpn-setup-mac
            vpn-client.exe
            vpn-client-linux
            vpn-client-mac
